<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comptes - Mauritanie</title>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.4/angular.min.js"></script>
  <style>
    :root {
      --brand: #06b6d4;
      --bg: #f4f7fb;
      --text: #1f2937;
      --muted: #6b7280;
      --danger: #991b1b;
      --success: #047857;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .phone {
      width: 360px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.2);
      background: var(--card);
    }

    .header {
      background: linear-gradient(90deg, #14b8a6, var(--brand));
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .account {
      padding: 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    .bank {
      font-size: 20px;
      font-weight: 700;
    }

    .iban,
    .balance {
      margin-top: 6px;
      color: var(--muted);
      font-size: 15px;
    }

    .balance strong {
      color: var(--text);
      font-size: 20px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
      align-items: center;
    }

    .toolbar label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    input,
    select {
      width: 100%;
      padding: 9px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }

    .tx {
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    .tx-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
      font-size: 14px;
      color: var(--muted);
    }

    .amount.dr { color: var(--danger); font-weight: 700; }
    .amount.cr { color: var(--success); font-weight: 700; }

    .tx-desc {
      font-size: 15px;
      margin: 3px 0;
    }

    .tx-ref {
      font-size: 13px;
      color: var(--muted);
      word-break: break-all;
    }

    .empty {
      padding: 16px;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div ng-app="myCompany" ng-controller="myCtrl" class="phone">
    <div class="header">Comptes Mauritanie</div>

    <div class="account">
      <div class="bank">Banque Populaire de Mauritanie</div>
      <div class="iban">{{accountNumber}}</div>
      <div class="balance">Solde disponible: <strong>{{balance | number:2}} MRU</strong></div>
    </div>

    <div class="toolbar">
      <div>
        <label for="search">Recherche (référence ou libellé)</label>
        <input id="search" type="text" ng-model="searchTerm" placeholder="ex: facture" />
      </div>
      <div>
        <label for="type">Type</label>
        <select id="type" ng-model="typeFilter">
          <option value="">Tous</option>
          <option value="Dr">Débit</option>
          <option value="Cr">Crédit</option>
        </select>
      </div>
    </div>

    <div class="tx" ng-repeat="tx in transactions | filter:searchFilter">
      <div class="tx-top">
        <span>{{tx.date}}</span>
        <span class="amount" ng-class="{'dr': tx.type === 'Dr', 'cr': tx.type === 'Cr'}">MRU {{tx.amount}} {{tx.type}}</span>
      </div>
      <div class="tx-desc">{{tx.description}}</div>
      <div class="tx-ref">{{tx.reference}}</div>
    </div>

    <div class="empty" ng-if="(transactions | filter:searchFilter).length === 0">
      Aucune transaction trouvée.
    </div>
  </div>

  <script>
    var app = angular.module("myCompany", []);

    app.controller("myCtrl", function ($scope) {
      $scope.accountNumber = "00018001002100213640166";
      $scope.balance = 2503668.34;
      $scope.searchTerm = "";
      $scope.typeFilter = "";

      $scope.transactions = [
        { date: "09-09-19", description: "Paiement de facture fractionnée", reference: "0119090911372303100", amount: 5, type: "Dr" },
        { date: "09-09-19", description: "Paiement de facture fractionnée", reference: "0119090911372303100", amount: 1995, type: "Dr" },
        { date: "08-09-19", description: "Versement", reference: "0119090818002533800", amount: 500, type: "Cr" },
        { date: "08-09-19", description: "Versement", reference: "0119090818001784100", amount: 500, type: "Cr" }
      ];

      $scope.searchFilter = function (tx) {
        var matchesText = !$scope.searchTerm ||
          tx.description.toLowerCase().indexOf($scope.searchTerm.toLowerCase()) !== -1 ||
          tx.reference.indexOf($scope.searchTerm) !== -1;

        var matchesType = !$scope.typeFilter || tx.type === $scope.typeFilter;

        return matchesText && matchesType;
      };
    });
  </script>
</body>
</html>
